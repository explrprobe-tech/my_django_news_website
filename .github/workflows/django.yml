name: Django CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  SECRET_KEY: 'django-insecure-test-key-for-ci-12345'
  DEBUG: 'False'
  ALLOWED_HOSTS: 'localhost,127.0.0.1,github.com'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10  
    
    strategy:
      matrix:
        python-version: ['3.12']  
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r mysite/requirements.txt
        
    - name: 🔧 Validate Django
      run: |
        echo "🔍 Проверяем Django..."
        python mysite/manage.py check
        echo "✅ Django валидация пройдена!"
        
    - name: 📋 Check migrations
      run: |
        echo "📊 Проверяем миграции..."
        python mysite/manage.py makemigrations --check --dry-run
        echo "✅ Миграции проверены!"
        
    - name: 🧪 Run tests
      run: |
        echo "🧪 Запускаем тесты..."
        python mysite/manage.py test news --parallel=auto --verbosity=3 --noinput --failfast
        echo "✅ Тесты завершены!"
